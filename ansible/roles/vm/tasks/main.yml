---
- name: Validate required ACR environment variables are present
  ansible.builtin.assert:
    that:
      - ACR_LOGIN_SERVER | length > 0
      - ACR_USERNAME | length > 0
      - ACR_PASSWORD | length > 0

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install Podman and dependencies
  ansible.builtin.apt:
    name:
      - podman
      - uidmap
      - slirp4netns
      - fuse-overlayfs
      - containernetworking-plugins
    state: present

- name: Login to ACR (Podman)
  containers.podman.podman_login:
    registry: "{{ ACR_LOGIN_SERVER }}"
    username: "{{ ACR_USERNAME }}"
    password: "{{ ACR_PASSWORD }}"

# -----------------------------
# REDIS IMAGE (amd64 VM) -> ACR
# -----------------------------

- name: Pull Redis upstream image (amd64 VM)
  containers.podman.podman_image:
    name: "{{ REDIS_UPSTREAM_IMAGE }}"
    state: present

- name: Tag Redis image for ACR
  containers.podman.podman_tag:
    image: "{{ REDIS_UPSTREAM_IMAGE }}"
    target_names:
      - "{{ REDIS_IMAGE_FULL }}"

- name: Push Redis image to ACR
  containers.podman.podman_image:
    name: "{{ REDIS_IMAGE_FULL }}"
    push: true
    state: present

# -----------------------------
# VOTING-FRONTEND IMAGE CONFIGURATION
# -----------------------------
- name: Ensure git is installed (for voting app source)
  ansible.builtin.apt:
    name: git
    state: present
    update_cache: false

- name: Clone Azure Voting App repo (azure-voting-app-redis)
  ansible.builtin.git:
    repo: "{{ VOTING_REPO_URL }}"
    dest: "{{ VOTING_REPO_DIR }}"
    version: "master"
    force: true

- name: Ensure Dockerfile uses fully qualified base image (Podman short-name policy)
  ansible.builtin.replace:
    path: "{{ VOTING_BUILD_CONTEXT_DIR }}/Dockerfile"
    regexp: '^FROM\s+tiangolo/uwsgi-nginx-flask:python3\.6\s*$'
    replace: "FROM {{ VOTING_BASE_IMAGE }}"

- name: Build voting frontend image locally on VM (native amd64)
  containers.podman.podman_image:
    name: "voting-frontend:casopractico2"
    path: "{{ VOTING_BUILD_CONTEXT_DIR }}"
    state: build
    force: true

- name: Tag voting frontend image for ACR
  containers.podman.podman_tag:
    image: "voting-frontend:casopractico2"
    target_names:
      - "{{ VOTING_IMAGE_FULL }}"

- name: Push voting frontend image to ACR
  containers.podman.podman_image:
    name: "{{ VOTING_IMAGE_FULL }}"
    push: true
    state: present

# -----------------------------
# BUILD IMAGE DIRECTLY ON VM (amd64)
# -----------------------------

- name: Create build directory
  ansible.builtin.file:
    path: /opt/cp2/webserver
    state: directory
    mode: "0755"

- name: Create html directory
  ansible.builtin.file:
    path: /opt/cp2/webserver/html
    state: directory
    mode: "0755"

- name: Copy Containerfile to VM
  ansible.builtin.copy:
    src: "webserver/Containerfile"
    dest: /opt/cp2/webserver/Containerfile
    mode: "0644"

- name: Copy nginx.conf to VM
  ansible.builtin.copy:
    src: "webserver/nginx.conf"
    dest: /opt/cp2/webserver/nginx.conf
    mode: "0644"

- name: Copy index.html to VM
  ansible.builtin.copy:
    src: "webserver/html/index.html"
    dest: /opt/cp2/webserver/html/index.html
    mode: "0644"

- name: Build webserver image locally on VM (native amd64)
  containers.podman.podman_image:
    name: "webserver:casopractico2"
    path: /opt/cp2/webserver
    state: build
    force: true

- name: Tag webserver image for ACR
  containers.podman.podman_tag:
    image: "webserver:casopractico2"
    target_names:
      - "{{ WEB_IMAGE_FULL }}"

- name: Push webserver image to ACR
  containers.podman.podman_image:
    name: "{{ WEB_IMAGE_FULL }}"
    push: true
    state: present

# -----------------------------
# DEPLOY CONTAINER FROM ACR
# -----------------------------

- name: Pull webserver image from ACR
  containers.podman.podman_image:
    name: "{{ WEB_IMAGE_FULL }}"
    state: present

- name: Ensure webserver container is running
  containers.podman.podman_container:
    name: "{{ WEB_CONTAINER_NAME }}"
    image: "{{ WEB_IMAGE_FULL }}"
    state: started
    recreate: true
    restart_policy: "no"
    ports:
      - "{{ WEB_HOST_PORT }}:{{ WEB_CONTAINER_PORT }}"

- name: Generate systemd unit for webserver container
  containers.podman.podman_generate_systemd:
    name: "{{ WEB_CONTAINER_NAME }}"
    dest: "{{ WEB_SYSTEMD_UNIT_DIR }}"
    container_prefix: "container"
    separator: "-"
    restart_policy: "always"
    new: true

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start webserver systemd service
  ansible.builtin.systemd:
    name: "{{ WEB_SYSTEMD_UNIT_NAME }}"
    enabled: true
    state: started
